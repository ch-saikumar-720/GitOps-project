name: CI/CD Workflow
run-name: Workflow for CICD pipeline - ${{ github.event.inputs.environment }} ${{ github.event.inputs.region }} - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select the environment
        required: true
        type: choice
        options:
          - dev
          - prod
          - test
      region:
        description: Select the region
        required: true
        type: choice
        options:
          - us-east-1
          - eu-west-1
permissions:
  contents: read        # default to read code
  issues: write  
  
jobs:
  tf_validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}
      - name: Terraform Format
        run: terraform fmt
      - name: Terraform Init
        run: terraform init
      - name: Terraform Validate
        run: terraform validate

  tf_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: tf_validate
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan -out=tfplan
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
      - name: Install Terraform Approval dependencies
        run: |
          cd .github/actions/terraform-approval
          npm ci
      - name: Request Approval
        id: request-approval
        uses: ./.github/actions/terraform-approval
        with:
          environment: ${{ github.event.inputs.environment }}
          region: ${{ github.event.inputs.region }}
          plan-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tf_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: tf_plan
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}
      - name: Install Terraform Approval dependencies
        run: |
          cd .github/actions/terraform-approval
          npm ci
      # Wait for approval comment on issue
      - name: Wait for Approval
        id: wait-approval
        uses: peter-evans/wait-for-issue-comment@v2
        with:
          issue-number: ${{ steps.request-approval.outputs.issue-number }}
          body: '/approve'
          timeout-minutes: 4320  # 3 days max wait

      # Download the plan artifact
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      # Apply Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
