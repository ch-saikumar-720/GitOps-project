name: CI/CD Workflow
run-name: Workflow for CICD pipeline - ${{ github.event.inputs.environment }} ${{ github.event.inputs.region }} - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select the environment
        required: true
        type: choice
        options:
          - dev
          - prod
          - test
      region:
        description: Select the region
        required: true
        type: choice
        options:
          - us-east-1
          - eu-west-1

permissions:
  contents: read        # read repo code
  issues: write          # needed for creating/writing issues

jobs:
  tf_validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}
      - name: Terraform Format
        run: terraform fmt
      - name: Terraform Init
        run: terraform init
      - name: Terraform Validate
        run: terraform validate

  tf_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: tf_validate
    defaults:
      run:
        working-directory: iac
    outputs:
      issue-number: ${{ steps.request-approval.outputs.issue-number }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan
          mkdir -p tfplan_artifact
          mv tfplan tfplan_artifact/

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./tfplan_artifact

      # Install dependencies for custom terraform-approval action
      - name: Install Terraform Approval dependencies
        run: |
          cd ../.github/actions/terraform-approval
          npm ci
          
      # Request Approval
      - name: Request Approval
        id: request-approval
        uses: ./.github/actions/terraform-approval
        with:
          environment: ${{ github.event.inputs.environment }}
          region: ${{ github.event.inputs.region }}
          plan-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tf_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: tf_plan
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}
          
      # Install dependencies for custom terraform-wait-approval action
      - name: Install Terraform Wait Approval dependencies
        run: |
          cd ../.github/actions/terraform-wait-approval
          npm ci

      # Wait for approval comment on issue
      - name: Wait for Approval
        id: wait-approval
        uses: ./.github/actions/terraform-wait-approval
        with:
          issue-number: ${{ needs.tf_plan.outputs.issue-number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Download the plan artifact
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      # Apply Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve ./tfplan_artifact/tfplan
