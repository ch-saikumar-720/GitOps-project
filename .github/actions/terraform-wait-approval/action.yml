name: Terraform Wait Approval
description: Waits for approval comment on a GitHub issue
runs:
  using: 'node16'
  main: 'index.js'
inputs:
  issue-number:
    description: 'The GitHub issue number to wait for approval on'
    required: true
  body:
    description: 'The comment text that triggers approval'
    required: true
  timeout-minutes:
    description: 'Maximum time in minutes to wait for approval'
    required: true
